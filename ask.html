<!DOCTYPE html>
<html>

<head>
<title>SOP Assistant</title>
</head>

<body>

<h2>Upload SOP PDF</h2>

<input type="file" id="pdfFile">

<br><br>

<h2>Ask Question</h2>

<input type="text" id="question" placeholder="Type keyword like salary">

<button onclick="searchText()">Search</button>

<pre id="result"></pre>


<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>

<script>

let fullText="";

document.getElementById("pdfFile").addEventListener("change", async function(){

const file=this.files[0];

const reader=new FileReader();

reader.onload=async function(){

const typedarray=new Uint8Array(this.result);

const pdf=await pdfjsLib.getDocument(typedarray).promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i);

const content=await page.getTextContent();

text+=content.items.map(item=>item.str).join(" ");

}

fullText=text.toLowerCase();

alert("PDF loaded successfully");

};

reader.readAsArrayBuffer(file);

});


function searchText(){

let question=document.getElementById("question").value.toLowerCase();

let sentences=fullText.split(".");

let matches=[];

for(let s of sentences){

if(s.includes(question)){

matches.push(s.trim());

}

}

if(matches.length==0){

document.getElementById("result").innerText="No result found";

return;

}

document.getElementById("result").innerText=matches.slice(0,5).join(". ");

}

</script>

</body>

</html>
