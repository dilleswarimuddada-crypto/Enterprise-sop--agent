<!DOCTYPE html>
<html>

<head>

<title>SOP Assistant</title>

<style>

body{

font-family: Arial;

margin:40px;

}

input{

width:300px;

padding:10px;

}

button{

background:#2d7ef7;

color:white;

border:none;

padding:10px 20px;

margin-left:10px;

cursor:pointer;

}

#result{

margin-top:20px;

background:#f1f1f1;

padding:15px;

white-space:pre-line;

}

</style>

</head>

<body>

<h2>Ask SOP Question</h2>

<input id="question" placeholder="Enter question">

<button onclick="askQuestion()">Ask</button>

<div id="result"></div>

<script>

async function askQuestion(){

let question = document.getElementById("question").value;

let res = await fetch("/ask",{

method:"POST",

headers:{

"Content-Type":"application/x-www-form-urlencoded"

},

body:"question="+question

});

let data = await res.json();

document.getElementById("result").innerText=data.answer;

}

</script>

</body>

</html>
